[package]
name = "aberp"
description = "ABERP binary — modular multi-tenant ERP backend."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license-file.workspace = true
repository.workspace = true
authors.workspace = true
publish.workspace = true

[[bin]]
name = "aberp"
path = "src/main.rs"

[dependencies]
# Workspace siblings
aberp-audit-ledger = { path = "../../crates/audit-ledger" }
aberp-billing = { path = "../../modules/billing" }

# Binary boundary: anyhow per ADR-0021 Part A item 2.
anyhow = { workspace = true }

# CLI
clap = { workspace = true }

# JSON input + (re-used) XML serialization
serde = { workspace = true }
serde_json = { workspace = true }
quick-xml = { workspace = true }

# Time, hashing
time = { workspace = true }
sha2 = { workspace = true }

# Storage — the binary owns the tenant DuckDB connection so it can drive
# one transaction across `aberp-billing` and `aberp-audit-ledger` per
# ADR-0008 §Storage. PR-6 close-out.
duckdb = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
