# ADR-0093 saw-off cut-gate — DB-isolation guardrail (the REQUIRED check).
#
# Deliberately a standalone, toolchain-free job: it runs the bash cut-gate
# (tools/cut_gate_db_isolation.sh, CHECK 1–10) PLUS the negative-probe harness
# with nothing but a checkout, so it gates in seconds and stays green
# independently of the heavy Rust+Tauri build in ci.yml. Its sole job is to
# make the ADR-0002/ADR-0093 DB-isolation mandate un-droppable at a
# product-line cut.
#
# This is the workflow intended as the branch-protection REQUIRED status
# check on the editions repo (see SAW-OFF.md → "Required status check (chunk
# 5 wiring)"). Because it needs no toolchain it can be required without making
# the gate hostage to an 8-minute build.
name: cut-gate
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  db-isolation:
    name: ADR-0093 DB-isolation cut-gate
    runs-on: ubuntu-latest
    # ADR-0098 R6: raised 5 -> 15. The gate itself still runs in seconds, but the
    # negative-probe harness (tools/cut_gate_negative_probes.sh) fresh()-copies the
    # whole tree once per probe and re-runs the full gate each time; with the R6
    # CHECK-10j/crates probe added it now runs ~5 min, which repeatedly grazed the
    # old 5-min cap and got the job CANCELLED (a false red on a REQUIRED check, and
    # a red on main since this workflow also runs on push:main). Pure timeout
    # accommodation — every ENFORCE_* check still runs in full and must pass (no
    # de-gate). FLAG (v0.2.6): speed up fresh() (git-archive/worktree copy) so the
    # suite is comfortably fast again.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Run DB-isolation cut-gate (CHECK 1–10, all ENFORCED)
        # Every ENFORCE_* flag is explicit here as well as defaulted in the
        # script, so enforcement is visible at the CI surface and cannot be
        # silently weakened by a one-line script edit.
        env:
          ENFORCE_EDITION_DB_BINDING: "1"        # CHECK 3 (chunk 2)
          ENFORCE_CHUNK3_INVARIANTS: "1"         # CHECK 4 (chunk 3)
          ENFORCE_CHECKPOINT_ATOMIC: "1"         # CHECK 5 (chunk 4)
          ENFORCE_SNAPSHOT_STORE_ISOLATION: "1"  # CHECK 6 (chunk 4)
          ENFORCE_LAUNCHER_ARM_MATCH: "1"        # CHECK 7 (chunk 4)
        run: bash tools/cut_gate_db_isolation.sh

      - name: Prove the cut-gate has teeth (negative probes)
        # Plants each invariant's violation in a throwaway copy and asserts the
        # gate FAILS — so a green gate above is a meaningful signal, not a
        # gate that can no longer go red.
        run: bash tools/cut_gate_negative_probes.sh
