# ABERP — Editions tree CI (Portable + Defense), ADR-0093 saw-off.
#
# This is the FULL-TOOLCHAIN gate that chunks 1–3 honestly DEFERRED to a
# machine with Rust+Tauri (the sandbox could not compile bundled DuckDB's
# ~8-min C++ amalgamation unit or link webkit2gtk). It exercises the whole
# workspace — build, test, clippy, fmt, supply-chain — for BOTH edition arms:
#
#   • Portable  = default features        (dev-profile, NAV-off, demo tenant)
#   • Defense   = --features production    (real-NAV production build)
#
# and runs the ADR-0093/0002 DB-isolation cut-gate (+ its negative probes) as
# a fast fail-fast BEFORE the heavy build, so an isolation regression goes red
# in seconds rather than after the 8-min DuckDB compile.
#
# Per ADR-0007 "Supply chain": cargo-deny + cargo-audit on --locked deps.
# Per ADR-0001/0021: the toolchain is the pinned stable CHANNEL declared in
# rust-toolchain.toml — the MSRV floor lives in each Cargo.toml's
# `rust-version`, and Cargo.lock is the load-bearing reproducibility pin. CI
# installs dtolnay/rust-toolchain@stable to MATCH that channel pin rather than
# hard-coding a version here (which would fight the repo's deliberate ADR-0001
# decision to pin the channel, not a version).

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel prior in-flight CI runs for the same ref when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 3
  RUSTUP_MAX_RETRIES: 3

jobs:
  workspace:
    name: ${{ matrix.edition }} · build + lint + test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      # Run both arms to completion — a Portable failure must not hide a
      # Defense failure (or vice versa).
      fail-fast: false
      matrix:
        include:
          - edition: portable
            features: ""
          - edition: defense
            features: "--features production"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ── Fail-fast DB-isolation gate (toolchain-free, ~seconds) ──────────
      # Runs BEFORE the ~8-min build so an ADR-0093/0002 isolation regression
      # (prod launch surface, cross-edition root, in-place checkpoint rewrite,
      # prod snapshot store, crossed launcher arms) goes red immediately. The
      # negative probes prove the gate itself still has teeth. Identical for
      # both arms (static source check) — cheap enough to keep per-arm so each
      # job is self-contained.
      - name: ADR-0093 DB-isolation cut-gate (CHECK 1–7, all ENFORCED)
        env:
          ENFORCE_EDITION_DB_BINDING: "1"
          ENFORCE_CHUNK3_INVARIANTS: "1"
          ENFORCE_CHECKPOINT_ATOMIC: "1"
          ENFORCE_SNAPSHOT_STORE_ISOLATION: "1"
          ENFORCE_LAUNCHER_ARM_MATCH: "1"
        run: bash tools/cut_gate_db_isolation.sh

      - name: Cut-gate negative probes (prove the gate has teeth)
        run: bash tools/cut_gate_negative_probes.sh

      - name: Install Tauri system dependencies (Linux)
        # apps/aberp-ui pulls in the Tauri 2 runtime (`wry`, `tao`,
        # `webkit2gtk-sys`, …). On Ubuntu those invoke pkg-config against
        # webkit2gtk-4.1, gtk-3, libsoup-3.0, librsvg, ayatana appindicator;
        # without the -dev packages the `wry`/`tao` build-scripts fail at link.
        # Mirrors the canonical Tauri 2 Ubuntu prerequisites.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libgtk-3-dev

      - name: Install Rust stable (matches rust-toolchain.toml channel pin)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Node.js
        # apps/aberp-ui embeds the Svelte SPA via Tauri's `generate_context!`,
        # which reads `frontendDist=ui/dist` at compile time. Without a
        # pre-built SPA the macro panics and the whole workspace build fails,
        # so Node + npm ci + vite build must run BEFORE cargo.
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/aberp-ui/ui/package-lock.json

      - name: Build SPA bundle (populates apps/aberp-ui/ui/dist)
        working-directory: apps/aberp-ui/ui
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Install Python (matches python/aberp-cad-extract pyproject min)
        # crates/aberp-cad-extract-wrapper/tests/* shell out to the Python CLI
        # at python/aberp-cad-extract. Without `python -m aberp_cad_extract`
        # importable, extract_smoke / step_extract_smoke / error_paths /
        # schema_version fail loud with "No module named aberp_cad_extract".
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: python/aberp-cad-extract/pyproject.toml

      - name: Install aberp-cad-extract Python package (with [step] extra)
        # The [step] extra pulls cadquery-ocp (+ proxy) + vtk, required by
        # step_extract_smoke.rs for OCCT-backed STEP parsing. ABERP_TEST_PYTHON
        # must be ABSOLUTE (pwd-drift in the test harness kills error-path
        # tests); sys.executable is always absolute.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e 'python/aberp-cad-extract[step]'
          echo "ABERP_TEST_PYTHON=$(python -c 'import sys; print(sys.executable)')" >> "$GITHUB_ENV"

      - name: Cargo cache (per edition arm)
        uses: Swatinem/rust-cache@v2
        with:
          # Portable (default) and Defense (--features production) produce
          # DIFFERENT artifacts; one shared key would thrash and let the ~8-min
          # bundled-DuckDB unit recompile every run. Per-arm key + Cargo.lock
          # hash (added by the action) keeps each arm's cache warm.
          shared-key: aberp-ci-${{ matrix.edition }}

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Build (${{ matrix.edition }}, --locked)
        # --all-targets builds tests/benches/examples too, catching compile
        # errors that would otherwise only surface later in test/clippy.
        run: cargo build --workspace --locked --all-targets ${{ matrix.features }}

      - name: Test (${{ matrix.edition }}, --locked)
        run: cargo test --workspace --locked ${{ matrix.features }}

      - name: Edition-isolation + crash-safe integration tests (by name)
        # Named explicitly (per SAW-OFF.md chunk-3 handoff) so they are visible
        # in the CI log and exercised even if the --workspace set is ever
        # narrowed. These are the bundled-DuckDB / wiring tests the sandbox
        # could not run. The `production` feature exists only on the
        # aberp / aberp-ui packages, so the edition-agnostic crate tests
        # (aberp-snapshot, aberp-audit-ledger) run WITHOUT it.
        run: |
          cargo test -p aberp --test edition_db_isolation ${{ matrix.features }} --locked
          cargo test -p aberp --test edition_snapshot_isolation ${{ matrix.features }} --locked
          cargo test -p aberp-snapshot --test crash_safe_checkpoint_tests --locked
          cargo test -p aberp-snapshot --test edition_isolation_tests --locked
          cargo test -p aberp-audit-ledger ensure_consistent_refuses_and_preserves_when_mirror_ahead_of_db --locked

      - name: Clippy (${{ matrix.edition }}, warnings denied per ADR-0007)
        run: cargo clippy --workspace --all-targets --locked ${{ matrix.features }} -- -D warnings

      # ── Supply chain (arm-independent: operates on Cargo.lock) ──────────
      # Run once, on the Portable arm, to avoid duplicating the advisory/
      # license scan across both matrix jobs.
      - name: Install cargo-deny and cargo-audit
        if: matrix.edition == 'portable'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit

      - name: cargo-deny check
        if: matrix.edition == 'portable'
        # Runs all sections: licenses, advisories, bans, sources.
        run: cargo deny check

      - name: cargo-audit
        if: matrix.edition == 'portable'
        # --deny warnings makes "informational" advisories failing-loud. The
        # --ignore list mirrors audit.toml / deny.toml::[advisories].ignore
        # because cargo-audit's audit.toml auto-discovery is inconsistent in
        # CI. Keep all three in lockstep when amending.
        run: |
          cargo audit --deny warnings \
            --ignore RUSTSEC-2025-0075 --ignore RUSTSEC-2025-0080 \
            --ignore RUSTSEC-2025-0081 --ignore RUSTSEC-2025-0098 \
            --ignore RUSTSEC-2025-0100 \
            --ignore RUSTSEC-2024-0411 --ignore RUSTSEC-2024-0412 \
            --ignore RUSTSEC-2024-0413 --ignore RUSTSEC-2024-0415 \
            --ignore RUSTSEC-2024-0416 --ignore RUSTSEC-2024-0418 \
            --ignore RUSTSEC-2024-0419 --ignore RUSTSEC-2024-0420 \
            --ignore RUSTSEC-2024-0429 \
            --ignore RUSTSEC-2024-0370 --ignore RUSTSEC-2024-0384 \
            --ignore RUSTSEC-2024-0388 --ignore RUSTSEC-2025-0134
