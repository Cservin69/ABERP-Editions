# ABERP continuous integration.
#
# Per ADR-0007 section "Supply chain":
#   - cargo-deny (license allow-list, banned crates, advisory check)
#   - cargo-audit (RustSec advisories on locked deps)
#   - pinned dependency versions, --locked builds
#
# Per ADR-0021 sub-decisions:
#   - rust-toolchain.toml pins 1.85.0 (MSRV floor)
#
# The job is intentionally a single sequence rather than a matrix or a
# parallel fan-out. CLAUDE.md rule 2 (simplicity first) — fan-out adds
# duplicate toolchain setup and a cache topology to manage, neither of
# which is justified until CI duration becomes painful.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel prior in-flight CI runs for the same ref when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # CI is non-interactive; surface failures verbosely.
  CARGO_NET_RETRY: 3
  RUSTUP_MAX_RETRIES: 3

jobs:
  check:
    name: build + lint + supply-chain
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tauri system dependencies (Linux only)
        # apps/aberp-ui pulls in the Tauri 2 runtime (`wry`, `tao`,
        # `tauri-runtime-wry`, `webkit2gtk-sys`, etc.). On macOS those
        # crates link against system frameworks (Cocoa/WebKit) that are
        # always present; on Ubuntu they invoke `pkg-config` against
        # webkit2gtk-4.1, gtk-3, libsoup-3.0, librsvg, and ayatana
        # appindicator. Without these `-dev` packages installed the
        # cargo build fails at the build-script / link stage of `wry`
        # or `tao`. List mirrors the canonical Tauri 2 Ubuntu 22.04+
        # prerequisites (https://tauri.app/start/prerequisites/).
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libgtk-3-dev

      - name: Install Rust stable (matches rust-toolchain.toml's channel pin)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Node.js
        # apps/aberp-ui embeds the Svelte SPA via Tauri's `generate_context!`
        # macro, which reads `frontendDist=ui/dist` at compile time. Without
        # a pre-built SPA bundle the macro panics and the whole workspace
        # build fails. Node + npm ci + vite build must run BEFORE cargo.
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/aberp-ui/ui/package-lock.json

      - name: Build SPA bundle (populates apps/aberp-ui/ui/dist)
        working-directory: apps/aberp-ui/ui
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Install Python (matches python/aberp-cad-extract pyproject min)
        # `crates/aberp-cad-extract-wrapper/tests/*` shell out to the
        # Python CLI at `python/aberp-cad-extract`. Without `python -m
        # aberp_cad_extract` importable, `extract_smoke` /
        # `step_extract_smoke` / `error_paths` / `schema_version` all
        # fail loud with "No module named aberp_cad_extract" (S303).
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: python/aberp-cad-extract/pyproject.toml

      - name: Install aberp-cad-extract Python package (with [step] extra)
        # The `[step]` extra pulls cadquery-ocp + cadquery-ocp-proxy +
        # vtk (~70 MB total). Required by `step_extract_smoke.rs` for
        # OCCT-backed STEP parsing (S292/PR-273). STL-only tests would
        # work without it, but installing once covers both fixtures.
        #
        # `ABERP_TEST_PYTHON` must be an ABSOLUTE path or pwd-drift in
        # the cargo test harness kills the error-path tests
        # ([[cad-extract-wrapper-s270]] memory). `sys.executable` is
        # always absolute, so use that instead of `which python`.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e 'python/aberp-cad-extract[step]'
          echo "ABERP_TEST_PYTHON=$(python -c 'import sys; print(sys.executable)')" >> "$GITHUB_ENV"

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          # Keyed on Cargo.lock contents; busted automatically on dep changes.
          shared-key: aberp-ci

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Build (--locked)
        # --all-targets builds tests/benches/examples too, which catches
        # compilation errors that would only show up later in test/clippy.
        run: cargo build --workspace --locked --all-targets

      - name: Test (--locked)
        run: cargo test --workspace --locked

      - name: Clippy (warnings denied per ADR-0007 fail-loud posture)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Install cargo-deny and cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit

      - name: cargo-deny check
        # Runs all sections: licenses, advisories, bans, sources.
        run: cargo deny check

      - name: cargo-audit
        # --deny warnings makes "informational" advisories (e.g. unmaintained
        # crates) failing-loud instead of advisory-only. The --ignore list
        # mirrors `audit.toml` / `deny.toml::[advisories].ignore` because
        # cargo-audit's audit.toml auto-discovery is inconsistent in CI
        # (S303). Keep all three in lockstep when amending.
        run: |
          cargo audit --deny warnings \
            --ignore RUSTSEC-2025-0075 --ignore RUSTSEC-2025-0080 \
            --ignore RUSTSEC-2025-0081 --ignore RUSTSEC-2025-0098 \
            --ignore RUSTSEC-2025-0100 \
            --ignore RUSTSEC-2024-0411 --ignore RUSTSEC-2024-0412 \
            --ignore RUSTSEC-2024-0413 --ignore RUSTSEC-2024-0415 \
            --ignore RUSTSEC-2024-0416 --ignore RUSTSEC-2024-0418 \
            --ignore RUSTSEC-2024-0419 --ignore RUSTSEC-2024-0420 \
            --ignore RUSTSEC-2024-0429 \
            --ignore RUSTSEC-2024-0370 --ignore RUSTSEC-2024-0384 \
            --ignore RUSTSEC-2024-0388 --ignore RUSTSEC-2025-0134
