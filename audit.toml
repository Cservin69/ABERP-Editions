# cargo-audit configuration per ADR-0007 §"Supply chain". Mirrors the
# advisory-ignore list in deny.toml; both tools consume the same RustSec
# advisory database from different angles and CI runs them in sequence,
# so the same advisories trip both. Keep the two ignore lists in lockstep
# — any new addition here MUST also be added to deny.toml::[advisories]
# (and vice versa), with the same per-id rationale comment.
#
# Established in S303 (first-CI-green sweep). Every entry below is a
# "RUSTSEC unmaintained" warning, NOT a CVE-class vulnerability. None
# of these crates are direct deps — they all reach our graph via Tauri
# 2's GTK3 Linux backend or via rustls 0.23's transitional rustls-pemfile
# 2.x dep, neither of which has a safe upgrade path yet.

[advisories]
ignore = [
    # tauri-utils → urlpattern → unic-* (no safe upgrade)
    "RUSTSEC-2025-0075",  # unic-char-range
    "RUSTSEC-2025-0080",  # unic-common
    "RUSTSEC-2025-0081",  # unic-char-property
    "RUSTSEC-2025-0098",  # unic-ucd-version
    "RUSTSEC-2025-0100",  # unic-ucd-ident

    # Tauri 2 Linux GTK3 backend (gtk-rs migrated to GTK4 upstream;
    # Tauri hasn't shipped a GTK4 path yet)
    "RUSTSEC-2024-0411",  # gdk
    "RUSTSEC-2024-0412",  # gdk-sys
    "RUSTSEC-2024-0413",  # atk
    "RUSTSEC-2024-0415",  # gtk
    "RUSTSEC-2024-0416",  # atk-sys
    "RUSTSEC-2024-0418",  # gtk-sys
    "RUSTSEC-2024-0419",  # gdkwayland-sys
    "RUSTSEC-2024-0420",  # gdkx11-sys
    "RUSTSEC-2024-0429",  # glib VariantStrIter unsoundness (Tauri GTK3)

    # Older ecosystem crates still in transitive trees
    "RUSTSEC-2024-0370",  # proc-macro-error (replaced by proc-macro-error2)
    "RUSTSEC-2024-0384",  # instant (replaced by web-time)
    "RUSTSEC-2024-0388",  # derivative (consider derive_more)
    "RUSTSEC-2025-0134",  # rustls-pemfile (transitional 2.x via rustls 0.23.x)
]
